# ─────────────────────────────────────────────────────────────
# n8n SMB Agent Template — Docker Compose
# ─────────────────────────────────────────────────────────────
# Compatible: Docker Desktop, OrbStack (macOS), Podman
# Targets:    Local dev (OrbStack) + Hostinger VPS (production)
#
# Quick start:
#   1. cp .env.example .env   (edit values)
#   2. docker compose up -d
#   3. Open http://localhost:5678
#
# Image versioning:
#   Set N8N_VERSION in .env to pin (e.g. 1.91.0).
#   Omit or set to "latest" for local dev.
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ─── Postgres — primary database ───────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-n8n-smb}-postgres
    restart: unless-stopped
    labels:
      - "app=n8n-smb"
      - "component=database"
      - "tier=backend"
    environment:
      POSTGRES_USER: ${DB_USER:-n8n}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-n8n} -d ${DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ── Production resource limits (uncomment for VPS) ──
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "1.0"
    #       memory: 512M
    #     reservations:
    #       cpus: "0.25"
    #       memory: 256M
    networks:
      - n8n_net

  # ─── Redis — queue backend ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-n8n-smb}-redis
    restart: unless-stopped
    labels:
      - "app=n8n-smb"
      - "component=cache"
      - "tier=backend"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ── Production resource limits (uncomment for VPS) ──
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "0.5"
    #       memory: 256M
    #     reservations:
    #       cpus: "0.1"
    #       memory: 128M
    networks:
      - n8n_net

  # ─── n8n Main (API + Editor + Webhooks) ───────────────
  n8n:
    image: n8nio/n8n:${N8N_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-n8n-smb}-n8n
    restart: unless-stopped
    labels:
      - "app=n8n-smb"
      - "component=application"
      - "tier=frontend"
      - "role=main"
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # ── Core ──
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_FOLDER=/home/node/.n8n
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN=true
      - N8N_PERSONALIZATION_ENABLED=false
      # ── DB ──
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-changeme}
      # ── Queue ──
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - QUEUE_BULL_REDIS_DB=0
      - EXECUTIONS_MODE=queue
      # ── Data Retention ──
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=50000
      - EXECUTIONS_DATA_PRUNE_TIMEOUT=3600
      # ── URLs ──
      - N8N_EXTERNAL_FRONTEND_URL=${N8N_PROTOCOL:-https}://${N8N_HOST}
      - WEBHOOK_URL=${N8N_PROTOCOL:-https}://${N8N_HOST}
      # ── Region ──
      - N8N_EDITOR_LICENSE_NOTIFICATIONS_ENABLED=false
      - GENERIC_TIMEZONE=${TZ:-Australia/Sydney}
      # ── Client ──
      - CLIENT_ID=${CLIENT_ID:-default}
      - CLIENT_NAME=${CLIENT_NAME:-Default Client}
      - CLIENT_LOCATION=${CLIENT_LOCATION:-Australia}
      - CLIENT_BUSINESS_TYPE=${CLIENT_BUSINESS_TYPE:-small business}
      - BRAND_VOICE=${BRAND_VOICE:-professional and friendly}
      # ── Meta ──
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - META_PAGE_ACCESS_TOKEN=${META_PAGE_ACCESS_TOKEN}
      - META_AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID}
      - META_SYSTEM_USER_TOKEN=${META_SYSTEM_USER_TOKEN}
      - META_WEBHOOK_VERIFY_TOKEN=${META_WEBHOOK_VERIFY_TOKEN}
      # ── Squarespace ──
      - SQUARESPACE_API_KEY=${SQUARESPACE_API_KEY}
      - SQUARESPACE_SITE_ID=${SQUARESPACE_SITE_ID}
      # ── LLM — Ollama ──
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_CLOUD_URL=${OLLAMA_CLOUD_URL}
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY}
      # ── LLM — SiliconFlow ──
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      # ── LLM — Anthropic ──
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      # ── LLM — Grok / xAI ──
      - GROK_API_KEY=${GROK_API_KEY}
      - GROK_BASE_URL=${GROK_BASE_URL:-https://api.x.ai/v1}
      # ── LLM — OpenAI ──
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # ── Google Sheets ──
      - GOOGLE_SHEETS_CLIENT_EMAIL=${GOOGLE_SHEETS_CLIENT_EMAIL}
      - GOOGLE_SHEETS_PRIVATE_KEY=${GOOGLE_SHEETS_PRIVATE_KEY}
      - LOG_SPREADSHEET_ID=${LOG_SPREADSHEET_ID}
      - LOG_SHEET_NAME=${LOG_SHEET_NAME:-ExecutionLog}
      # ── VPS ──
      - SERVER_IP=${SERVER_IP}
      - DOMAIN=${DOMAIN}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows-backup:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ── Production resource limits (uncomment for VPS) ──
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2.0"
    #       memory: 2048M
    #     reservations:
    #       cpus: "0.5"
    #       memory: 512M
    networks:
      - n8n_net
    # ── Reverse proxy labels — uncomment ONE section below

    # ── Option 1: Traefik v2 ──────────────────────────
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=n8n_net"
    #   - "traefik.http.routers.n8n.rule=Host(`${N8N_HOST}`)"
    #   - "traefik.http.routers.n8n.entrypoints=websecure"
    #   - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
    #   - "traefik.http.routers.n8n.middlewares=n8n-headers@docker"
    #   - "traefik.http.middlewares.n8n-headers.headers.customrequestheaders.X-Frame-Options=DENY"
    #   - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    #   - "traefik.http.services.n8n.loadbalancer.healthcheck.path=/healthz"
    #   - "traefik.http.services.n8n.loadbalancer.healthcheck.interval=30s"

    # ── Option 2: Caddy (run separately — see HOSTINGER-DEPLOY.md Step 7)
    # Caddyfile example:
    #   n8n.yourdomain.com {
    #       reverse_proxy localhost:5678
    #   }

  # ─── n8n Worker (queue mode) ──────────────────────────
  n8n-worker:
    image: n8nio/n8n:${N8N_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-n8n-smb}-worker
    restart: unless-stopped
    labels:
      - "app=n8n-smb"
      - "component=worker"
      - "tier=backend"
      - "role=worker"
    command: worker
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_FOLDER=/home/node/.n8n
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-changeme}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - QUEUE_BULL_REDIS_DB=0
      - EXECUTIONS_MODE=queue
      - GENERIC_TIMEZONE=${TZ:-Australia/Sydney}
      # Worker needs all client/LLM vars for HTTP requests
      - CLIENT_ID=${CLIENT_ID:-default}
      - BRAND_VOICE=${BRAND_VOICE:-professional and friendly}
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - META_PAGE_ACCESS_TOKEN=${META_PAGE_ACCESS_TOKEN}
      - META_AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID}
      - META_SYSTEM_USER_TOKEN=${META_SYSTEM_USER_TOKEN}
      - SQUARESPACE_API_KEY=${SQUARESPACE_API_KEY}
      - SQUARESPACE_SITE_ID=${SQUARESPACE_SITE_ID}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_CLOUD_URL=${OLLAMA_CLOUD_URL}
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
      - GROK_BASE_URL=${GROK_BASE_URL:-https://api.x.ai/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_SHEETS_CLIENT_EMAIL=${GOOGLE_SHEETS_CLIENT_EMAIL}
      - GOOGLE_SHEETS_PRIVATE_KEY=${GOOGLE_SHEETS_PRIVATE_KEY}
      - LOG_SPREADSHEET_ID=${LOG_SPREADSHEET_ID}
      - LOG_SHEET_NAME=${LOG_SHEET_NAME:-ExecutionLog}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'n8n worker' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ── Production resource limits (uncomment for VPS) ──
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2.0"
    #       memory: 2048M
    #     reservations:
    #       cpus: "0.5"
    #       memory: 256M
    networks:
      - n8n_net

networks:
  n8n_net:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-n8n-smb}_net

volumes:
  # Named volumes with COMPOSE_PROJECT_NAME prefix for multi-client isolation.
  # Backup:  docker run --rm -v [name]:/data -v $(pwd):/backup alpine tar czf /backup/[name].tar.gz -C /data .
  # Restore: docker run --rm -v [name]:/data -v $(pwd):/backup alpine tar xzf /backup/[name].tar.gz -C /data
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-n8n-smb}_postgres_data
  redis_data:
    name: ${COMPOSE_PROJECT_NAME:-n8n-smb}_redis_data
  n8n_data:
    name: ${COMPOSE_PROJECT_NAME:-n8n-smb}_n8n_data
